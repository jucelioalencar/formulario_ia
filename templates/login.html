<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Formulário IA</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Poppins', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #1a1a1a 0%, #2d2d2d 50%, #1a1a1a 100%);
        }
        .form-container {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 50px 40px;
            border-radius: 20px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
        }
        .form-container::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 4px;
            background: linear-gradient(90deg, #F40009, #ff4d4d, #F40009);
            border-radius: 20px 20px 0 0;
        }
        h2 { text-align: center; color: #fff; margin-bottom: 35px; font-size: 26px; }
        .form-group { margin-bottom: 22px; }
        label { display: block; margin-bottom: 8px; color: #ccc; font-size: 13px; font-weight: 500; }
        input {
            width: 100%; padding: 16px 20px;
            background: rgba(255,255,255,0.08);
            border: 2px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            font-size: 16px; color: #fff;
            font-family: 'Poppins', sans-serif;
        }
        input:focus { outline: none; border-color: #F40009; }
        button {
            width: 100%; padding: 18px;
            background: linear-gradient(135deg, #F40009 0%, #d30008 100%);
            color: white; border: none; border-radius: 12px;
            font-size: 16px; font-weight: 600; cursor: pointer;
            margin-top: 20px; font-family: 'Poppins', sans-serif;
            text-transform: uppercase; letter-spacing: 2px;
        }
        button:hover { transform: translateY(-3px); box-shadow: 0 15px 30px rgba(244,0,9,0.4); }
        .texto { text-align: center; margin-top: 20px; color: #ccc; }
        .texto a { color: #F40009; text-decoration: none; }
        .texto a:hover { text-decoration: underline; }
        .mensagem {
            text-align: center; margin-bottom: 15px; padding: 15px;
            border-radius: 10px; font-size: 14px;
        }
        .mensagem.erro { background: rgba(244, 67, 54, 0.2); border: 1px solid rgba(244, 67, 54, 0.5); color: #ff5252; }
        .mensagem.sucesso { background: rgba(76, 175, 80, 0.2); border: 1px solid rgba(76, 175, 80, 0.5); color: #4caf50; }
    </style>
</head>
<body>
    <div class="form-container">
        <h2>LOGIN</h2>
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="mensagem {{ category }}">{{ message }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}
        <form method="POST">
            <div class="form-group">
                <label for="email">E-mail</label>
                <input type="email" id="email" name="email" placeholder="seu@email.com" required>
            </div>
            <div class="form-group">
                <label for="senha">Senha</label>
                <input type="password" id="senha" name="senha" placeholder="••••••••" required>
            </div>
            <button type="submit">ENTRAR</button>
        </form>
        <p class="texto">Não tem conta? <a href="{{ url_for('registro') }}">Cadastre-se</a></p>
    </div>
</body>
</html>
